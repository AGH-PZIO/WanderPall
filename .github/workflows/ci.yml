name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Test backend
        run: ./scripts/test.sh backend-unit

      - name: Export OpenAPI
        working-directory: backend
        run: ../.venv/bin/python -m scripts.export_openapi

      - name: Check OpenAPI is up to date
        run: git diff --exit-code docs/openapi.json

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate API types
        working-directory: frontend
        run: npm run api:types

      - name: Check generated API types are up to date
        run: git diff --exit-code frontend/src/shared/api-types.ts

      - name: Test frontend
        run: ./scripts/test.sh frontend

  docker:
    name: Docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compose config
        run: docker compose --profile full config

      - name: Build images
        run: docker compose build backend frontend

      - name: Start database
        run: ./scripts/start.sh db

      - name: Check migration status
        run: docker compose exec -T db psql -U wanderpall -d wanderpall -c "select filename from shared.schema_migrations order by filename;"
