services:
  db:
    image: postgres:18-alpine
    container_name: wanderpall-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wanderpall}
      POSTGRES_USER: ${POSTGRES_USER:-wanderpall}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wanderpall}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wanderpall} -d ${POSTGRES_DB:-wanderpall}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["backend", "full"]
    build:
      context: ./backend
    container_name: wanderpall-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://wanderpall:wanderpall@db:5432/wanderpall
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-http://localhost:8000/travel-assistance/gmail/oauth/callback}
      GMAIL_TOKEN_ENCRYPTION_KEY: ${GMAIL_TOKEN_ENCRYPTION_KEY:-}
      FRONTEND_OAUTH_REDIRECT_URL: ${FRONTEND_OAUTH_REDIRECT_URL:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app:ro
      - ./backend/media:/app/media:rw

  frontend:
    profiles: ["full"]
    build:
      context: ./frontend
    container_name: wanderpall-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro

volumes:
  postgres_data:
